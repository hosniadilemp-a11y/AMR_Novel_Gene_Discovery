name: amr_env
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # -----------------------------------------------
  # Core Language
  # -----------------------------------------------
  - python=3.10
  - pip

  # -----------------------------------------------
  # Step 1: Quality Control & Trimming
  # -----------------------------------------------
  - fastqc=0.12.1
  - cutadapt=5.2
  - multiqc=1.35
  - trim-galore=0.6.10

  # -----------------------------------------------
  # Step 2: Assembly & Mapping
  # -----------------------------------------------
  - spades=3.15.5
  - quast=5.2.0
  - minimap2=2.24
  - samtools=1.16
  - mosdepth=0.3.3
  - bwa=0.7.17

  # -----------------------------------------------
  # Step 3: Annotation & Profiling
  # -----------------------------------------------
  - prokka=1.14.6
  - abricate=1.0.1
  - ncbi-amrfinderplus=4.2.7
  - mob-suite=3.1.8
  - mlst=2.23.0

  # -----------------------------------------------
  # Step 3b: Pangenomics & Phylogeny
  # -----------------------------------------------
  - ncbi-genome-download=0.3.3
  - panaroo=1.3.4
  - iqtree=2.2.2.6
  - mafft=7.520
  - fasttree=2.1.11
  - fastp=0.23.4

  # -----------------------------------------------
  # Step 4: Mobile Genetic Elements
  # -----------------------------------------------
  - isescan=1.7.3
  - integron-finder=2.0.2
  - clinker=0.0.32

  # -----------------------------------------------
  # Step 6c: Structural Alignment
  # -----------------------------------------------
  - tmalign=20170708

  # -----------------------------------------------
  # Step 7: Docking
  # -----------------------------------------------
  - autodock-vina=1.2.5
  - openbabel=3.1.1

  # -----------------------------------------------
  # Core Python Libraries (all steps)
  # -----------------------------------------------
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.0
  - scikit-learn=1.4.2
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - biopython=1.83
  - networkx=3.3

  # -----------------------------------------------
  # Step 5: BLAST & Domain Search
  # -----------------------------------------------
  - blast=2.14.1
  - hmmer=3.3.2
  - diamond=2.1.9

  # -----------------------------------------------
  # Step 7: PLM Analysis & Dimensionality Reduction
  # -----------------------------------------------
  - umap-learn=0.5.6
  - pip:
      - torch==2.1.0
      - transformers==4.41.0
      - fair-esm==2.0.0
      - MDAnalysis==2.7.0
      - nglview==3.1.0
      - statsmodels==0.14.2
      - requests==2.31.0
      - tqdm==4.66.4
      - openmm==8.1.1
      - pdbfixer==1.9

  # -----------------------------------------------
  # Utilities
  # -----------------------------------------------
  - wget=1.21.4
  - curl=8.7.1
  - git=2.43.0
  - parallel=20230722
